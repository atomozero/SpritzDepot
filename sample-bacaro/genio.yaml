cicheto: 1
id: org.haiku.genio
name: Genio
summary: IDE nativo per Haiku
description: |
  Genio e un ambiente di sviluppo integrato scritto nativamente per Haiku,
  pensato per C/C++ ma estensibile ad altri linguaggi.

  Offre completamento del codice tramite LSP, integrazione con git, un
  debugger e la gestione di progetti multipli. Punta a un'esperienza fluida
  e coerente con lo stile di Haiku.
homepage: https://github.com/Genio-The-Haiku-IDE/Genio
license: MIT
categories:
  - development
  - editors

author:
  name: Genio Team
  contact: https://github.com/Genio-The-Haiku-IDE

packager:
  name: Andrea Bernardi
  bacaro: vepro

bridge:
  haikuports: genio
  prefer: stable

channels:
  stable:
    version: "3.2"
    kind: hpkg
    artifacts:
      x86_64:
        url: https://example.org/genio-3.2-x86_64.hpkg
        sha256: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
    requires:
      - lib:libgit2
      - cmd:git
  ombra:
    kind: hpkg
    source: github-latest
    match: "genio-*-{arch}.hpkg"
    prerelease: true

{% extends "base.html" %}
{% block title %}{{ t('login.title') }} - spritz{% endblock %}

{% block content %}
<article class="app-detail" style="max-width:460px;">
  <h1>{{ t('login.title') }}</h1>
  <p class="lead">{{ t('login.lead') }}</p>

  <section class="install">
    <form id="auth-form"
          data-msg-required="{{ t('login.required') }}"
          data-msg-wait="{{ t('login.wait') }}"
          data-msg-done="{{ t('login.done') }}"
          data-msg-wrong="{{ t('login.wrong') }}"
          data-msg-exists="{{ t('login.exists') }}"
          data-msg-short="{{ t('login.short') }}"
          data-msg-throttled="{{ t('login.throttled') }}"
          data-msg-error="{{ t('login.error') }}">
      <p>
        <label>{{ t('login.email') }}<br>
        <input type="email" name="email" required class="field" autocomplete="username"></label>
      </p>
      <p>
        <label>{{ t('login.password') }}<br>
        <input type="password" name="password" required class="field"
               autocomplete="current-password" minlength="8"></label>
        <span class="hint">{{ t('login.min_chars') }}</span>
      </p>
      <p>
        <button type="submit" class="btn" id="btn-login">{{ t('login.title') }}</button>
        <button type="button" class="btn btn-fallback" id="btn-register">{{ t('login.register') }}</button>
        <span class="hint" id="auth-status"></span>
      </p>
    </form>
  </section>
</article>

<script src="/static/login.js"></script>
{% endblock %}

name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite
        # tests/test_scripts.py runs each standalone script in its own
        # subprocess (see its docstring). test_repo_proxy skips unless
        # SPRITZ_PACKAGE_REPO_BIN points at a host-built package_repo, which
        # is not available on a plain runner.
        run: pytest -q
